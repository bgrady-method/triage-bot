# Routine: triage
#
# This file is a CONFIG TEMPLATE for the Anthropic routine you create at
# https://claude.ai/code/routines. The routine UI is the source of truth;
# this file documents the intended configuration so it lives in version control
# alongside the prompt and scripts. When you update settings in the UI, update
# this file in the same PR.
#
# Setup steps:
#   1. https://claude.ai/code/routines -> "New routine"
#   2. Paste the contents of prompt.md as the prompt
#   3. Configure as below
#   4. Save and copy the generated /fire URL + bearer token
#   5. wrangler secret put ROUTINE_FIRE_URL    (paste the URL)
#   6. wrangler secret put ROUTINE_FIRE_TOKEN  (paste the token)
#   7. Update wrangler.toml: PHASE = "1"
#   8. wrangler deploy

name: triage
description: Investigate Slack alerts, classify, DM Ben (or PR in v2)

prompt_file: prompt.md

trigger:
  type: api
  # The /fire URL is generated by Anthropic when you save the routine.
  # POST {fire_url} with bearer token and JSON body { "text": "<alert payload as JSON string>" }

repos:
  # The bot's own repo — KB lives here, scripts run from here, prompt is read from here
  - url: https://github.com/bgrady-method/triage-bot
    branch: main
    push_branches: ["claude/*"]   # routine pushes its own work to claude/* branches only

  # Method service repos that get cloned for codebase grep / diff proposals.
  # Start with the 5-10 most-alerted-on services. Add more as the KB tells us where alerts cluster.
  - url: https://github.com/methodintegration/m-one
    branch: main
    push_branches: []   # read-only by default in v1
  - url: https://github.com/methodintegration/tables-fields
    branch: main
    push_branches: []
  - url: https://github.com/methodintegration/api-gateway
    branch: main
    push_branches: []
  # ... add more as we learn from incident-log.jsonl

mcp_connectors:
  - slack         # chat.postMessage, conversations.open (DM)
  - github        # branch + PR ops (only enabled for triage-bot repo in v1)

secrets:
  # Datadog
  - DD_API_KEY
  - DD_APP_KEY
  - DD_SITE                  # default: datadoghq.com

  # Elasticsearch / Logstash
  - ELK_BASE_URL             # e.g. https://logstash.method.internal:9243
  - ELK_USER
  - ELK_PASS
  - ELK_INDEX_GLOB           # default: logstash-*

  # SQL via SSH tunnel
  - SSH_HOST
  - SSH_PORT                 # default: 22
  - SSH_USER
  - SSH_PRIVATE_KEY          # PEM contents (NOT a path)
  - SQL_HOST
  - SQL_PORT                 # default: 1433
  - SQL_USER
  - SQL_PASS_RO
  - SQL_DATABASE

  # Slack
  - SLACK_BOT_TOKEN          # xoxb-... — same token used by the Cloudflare Worker
  - SLACK_BEN_USER_ID        # U... — Ben's Slack user ID for DMs

  # GitHub
  - GH_TOKEN                 # PAT or fine-grained token with repo write on triage-bot, repo read on Method services

settings:
  timeout_minutes: 10        # one alert investigation should fit comfortably; abort if it doesn't
  max_concurrent_runs: 5     # alert storms get debounced in the Worker; 5 lets us absorb small bursts
  unrestricted_branch_push: false   # v1: claude/* only. v2: enable per-repo for repos we want auto-PRs to.
