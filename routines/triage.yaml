# Routine: triage  (v0.5 — pull-mode polling via Slack MCP)
#
# Config template for the Anthropic routine at https://claude.ai/code/routines.
# The routine UI is source of truth; this file documents the intended config so
# it stays in version control with the prompt and scripts. Update both together.
#
# Why polling: in v0.5 we skip the Slack-app + Cloudflare-Worker push path and
# let the routine pull recent messages from the alert channels itself, every
# hour, via Slack MCP. Trade-off: up to 1h latency per alert. This is fine for
# everything except #swat, where we'll add push later.
#
# Setup steps:
#   1. https://claude.ai/code/routines -> "New routine"
#   2. Paste prompt.md as the prompt
#   3. Connect the Slack MCP connector — OAuth as Ben (the routine will act as you)
#   4. Connect the GitHub MCP connector
#   5. Add the secrets listed below
#   6. Save. The cron starts firing on the next hour boundary.

name: triage
description: Poll Slack alert channels every hour; investigate new messages; DM findings

prompt_file: prompt.md

trigger:
  type: cron
  expression: "0 * * * *"     # every hour on the hour. 1h is the cloud-routine minimum.
                              # If you tighten this later (e.g. via Desktop scheduled tasks),
                              # also lower poll_window_minutes in kb/config.json.

repos:
  # The bot's own repo — KB lives here, scripts run from here, prompt is read from here
  - url: https://github.com/bgrady-method/triage-bot
    branch: main
    push_branches: ["claude/*", "main"]
    # claude/* for per-alert work branches
    # main for kb/incident-log.jsonl appends (the routine commits log lines back to main on every run)

  # Method service repos that get cloned for codebase grep / diff proposals.
  # Start with the 5-10 most-alerted-on services. Add more as the KB tells us where alerts cluster.
  - url: https://github.com/methodintegration/m-one
    branch: main
    push_branches: []         # read-only by default in v1
  - url: https://github.com/methodintegration/tables-fields
    branch: main
    push_branches: []
  - url: https://github.com/methodintegration/api-gateway
    branch: main
    push_branches: []
  # ... add more as we learn from incident-log.jsonl

mcp_connectors:
  - slack       # conversations.history (poll), chat.postMessage (thread reply, DM self), reactions.get
  - github      # branch + PR ops (only enabled for triage-bot repo in v1)

secrets:
  # Datadog
  - DD_API_KEY
  - DD_APP_KEY
  - DD_SITE                   # default: datadoghq.com

  # Elasticsearch / Logstash
  - ELK_BASE_URL              # e.g. https://logstash.method.internal:9243
  - ELK_USER
  - ELK_PASS
  - ELK_INDEX_GLOB            # default: logstash-*

  # SSH bastion (used by both SQL and Mongo tunnels — single set of creds)
  - SSH_HOST                  # e.g. hq.method.me
  - SSH_PORT                  # e.g. 9433
  - SSH_USER                  # e.g. b.grady
  - SSH_PASS                  # password auth (not key)

  # SQL via SSH tunnel — values mirror method-db-tools/config/connections.json
  - SQL_HOST_PROD1            # e.g. 172.31.121.125
  - SQL_HOST_PROD2            # e.g. 172.31.121.225
  - SQL_PORT                  # default: 1433
  - SQL_USER                  # e.g. reader
  - SQL_PASS_RO
  - SQL_DATABASE              # e.g. AlocetSystem

  # MongoDB via SSH tunnel — full URIs (with embedded admin creds, mirrors connections.json)
  # Add a MONGO_URI_<NAME> for each environment you want queryable.
  - MONGO_URI_WAREHOUSE
  - MONGO_URI_RETAIL
  - MONGO_URI_DELTA
  - MONGO_URI_SIGMA
  - MONGO_URI_EPSILON
  - MONGO_URI_MEGA
  - MONGO_URI_GAMMA
  - MONGO_URI_BETA

  # GitHub
  - GH_TOKEN                  # PAT with repo write on triage-bot, repo read on Method services

  # Note: no SLACK_BOT_TOKEN. Slack MCP handles auth via its own OAuth.
  # The bot acts as Ben (the user who connected the MCP).

settings:
  timeout_minutes: 30         # poll cycle may investigate multiple alerts in one run
  max_concurrent_runs: 1      # cron is hourly; only one poll cycle in flight at a time
  unrestricted_branch_push: false
