# Routine: heartbeat  (v0.5)
#
# Runs every 6h. Posts a one-liner to #triage-bot-health summarizing the bot's
# state, and enforces the daily spend cap by flipping kb/config.json.enabled
# to false if today's spend exceeds the cap.
#
# This is the canary: if #triage-bot-health goes silent for >12h, the bot is
# dead and Ben should investigate.

name: heartbeat
description: Posts triage-bot status; enforces spend cap

prompt: |
  You are the triage-bot heartbeat. Run this exact procedure:

  1. Read kb/incident-log.jsonl. Compute:
     - Per-message lines today (UTC midnight to now), excluding `classification=poll-cycle` summaries
     - Poll-cycle lines today (the cron heartbeat — should be ≥1 every 6h)
     - Lines this week
     - Sum of runtime_cost_usd today (across all line types)
     - Time since last poll-cycle line (this is the most direct "is the cron alive" signal)
     - Last KB update: `git log -1 --format=%ct -- kb/known-issues.json kb/false-alarms.json`

  2. Read kb/config.json's max_spend_usd.

  3. If sum_cost_today > max_spend_usd:
       - Edit kb/config.json: set "enabled": false
       - git commit kb/config.json with message "heartbeat: daily spend cap reached, disabling"
       - git push origin main
       - Post to #triage-bot-health: "🔴 triage-bot DISABLED: today's spend $X.XX > cap $Y.YY"
     Else if time_since_last_poll_cycle > 90 minutes:
       - Post to #triage-bot-health: "🟡 triage-bot: no poll cycle in <Nm> — cron may be stuck"
     Else:
       - Post to #triage-bot-health: "🟢 triage-bot alive · today: N alerts processed ($X.XX) · last poll <ago> · last KB update <ago>"

  4. Sanity-check that recent alerts have incident-log entries.
     - For each alert channel, slack conversations.history last 6h
     - For each non-bot, non-self message: compute alert_hash, grep kb/incident-log.jsonl
     - If any are missing, list them in the heartbeat post (max 3, "...and N more")

  Keep the post under 4 lines.

trigger:
  type: cron
  expression: "0 */6 * * *"    # every 6 hours

repos:
  - url: https://github.com/bgrady-method/triage-bot
    branch: main
    push_branches: ["main"]    # heartbeat needs to be able to flip the kill switch

mcp_connectors:
  - slack
  - github

secrets:
  - GH_TOKEN

settings:
  timeout_minutes: 5
